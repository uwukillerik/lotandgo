# nginx: Lot&Go (порты Keenetic 7080→80, 3454→443)
# Скопировать: sudo cp deploy/nginx/lotgo.conf /etc/nginx/sites-available/lotgo

# HTTP — внутри VM слушает 80, снаружи :7080
server {
    listen 80;
    server_name lotgo.ru www.lotgo.ru 77.50.193.34;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS — внутри VM слушает 443, снаружи :3454
server {
    listen 443 ssl;
    server_name lotgo.ru www.lotgo.ru 77.50.193.34;

    ssl_certificate     /etc/nginx/ssl/lotgo/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/lotgo/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
